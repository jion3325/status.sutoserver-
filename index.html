<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sutoserverステータス</title>
<style>
  :root {
    --bg-color: #f8f9fa;
    --card-bg: #ffffff;
    --online-color: #2ecc71;
    --offline-color: #e74c3c;
    --maint-color: #f39c12;
    --text-main: #333;
    --text-sub: #95a5a6;
  }

  body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); line-height: 1.6; }
  .container { max-width: 600px; margin: auto; }
  
  .category-title { 
    margin: 30px 0 15px 5px; 
    font-size: 18px; 
    font-weight: 800; 
    color: var(--text-main);
    border-left: 4px solid #3498db;
    padding-left: 10px;
  }

  .main-title { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
  .sub-header { font-size: 13px; color: var(--text-sub); margin-bottom: 25px; font-weight: bold; }

  .card {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 18px;
    margin-bottom: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.05);
  }

  .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .server-name-wrap { display: flex; align-items: center; gap: 10px; }
  
  .status-badge {
    background: var(--online-color);
    color: white;
    padding: 3px 12px;
    border-radius: 25px;
    font-size: 10px;
    font-weight: 800;
    min-width: 35px;
    text-align: center;
  }
  .status-badge.offline { background: var(--offline-color); }
  .status-badge.maintenance { background: var(--maint-color); }

  .server-name { font-size: 16px; font-weight: 700; color: #2c3e50; }
  .ping-display { font-size: 11px; color: var(--text-sub); font-family: monospace; }
  .info-row { display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d; }

  .uptime-bar { display: flex; gap: 3px; height: 24px; margin-top: 12px; }
  .dot { flex: 1; height: 100%; background: #f0f0f0; border-radius: 3px; transition: all 0.3s ease; }
  .dot.on { background: var(--online-color); }
  .dot.off { background: var(--offline-color); }
  .dot.maint { background: var(--maint-color); }

  .time-label { display: flex; justify-content: space-between; font-size: 9px; color: #bdc3c7; margin-top: 6px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
  <div class="main-title">sutoserverステータス</div>
  <div class="sub-header">SERVICE OPERATIONAL STATUS</div>

  <div class="category-title">ホストサービス</div>
  
  <div class="card">
    <div class="title-row">
      <div class="server-name-wrap">
        <span id="node1Badge" class="status-badge">---</span>
        <span class="server-name">リリース鯖</span>
      </div>
      <span id="node1Ping" class="ping-display">-- ms</span>
    </div>
    <div class="info-row">
      <span>Load: <span id="node1Status" style="font-weight:bold;">---</span></span>
      <span style="font-size: 10px;">sutoserver.net</span>
    </div>
    <div class="uptime-bar" id="node1Dots"></div>
    <div class="time-label"><span>30m ago</span><span>now</span></div>
  </div>

  <div class="category-title">Webサービス</div>

  <div class="card">
    <div class="title-row">
      <div class="server-name-wrap">
        <span id="panelBadge" class="status-badge">---</span>
        <span class="server-name">管理パネル</span>
      </div>
      <span id="panelPing" class="ping-display">-- ms</span>
    </div>
    <div class="info-row">
      <span>Status: <span id="panelStatus" style="font-weight:bold;">---</span></span>
      <span style="font-size: 10px;">秘密</span>
    </div>
    <div class="uptime-bar" id="panelDots"></div>
    <div class="time-label"><span>30m ago</span><span>now</span></div>
  </div>

  <div class="card">
    <div class="title-row">
      <div class="server-name-wrap">
        <span id="webBadge" class="status-badge">---</span>
        <span class="server-name">ホームページ</span>
      </div>
      <span id="webPing" class="ping-display">-- ms</span>
    </div>
    <div class="info-row">
      <span>Status: <span id="webStatus" style="font-weight:bold;">---</span></span>
      <span style="font-size: 10px;">sutoserver.com</span>
    </div>
    <div class="uptime-bar" id="webDots"></div>
    <div class="time-label"><span>30m ago</span><span>now</span></div>
  </div>

  <div class="category-title">Discord関連</div>

  <div class="card">
    <div class="title-row">
      <div class="server-name-wrap">
        <span id="botBadge" class="status-badge">---</span>
        <span class="server-name">Discord Bot</span>
      </div>
      <span id="botPing" class="ping-display">-- ms</span>
    </div>
    <div class="info-row">
      <span>Status: <span id="botStatus" style="font-weight:bold;">---</span></span>
      <span style="font-size: 10px;">たけのこの里食べたい</span>
    </div>
    <div class="uptime-bar" id="botDots"></div>
    <div class="time-label"><span>30m ago</span><span>now</span></div>
  </div>
</div>

<script>
const targets = {
  node1: { type: 'mc', address: 'node1.swdhst.com:2087' },
  panel: { type: 'web', address: 'https://panel.swordhost.net/server/a1a1b61b' },
  web:   { type: 'web', address: 'https://sutoserver.com' }, // ← ここにカンマが必要でした
  bot:   { type: 'mc',  address: 'bravo.shironekoserver.com:49180' }
};

const MAX_DOTS = 35;
let historyData = {};

function init() {
  Object.keys(targets).forEach(id => {
    historyData[id] = Array(MAX_DOTS).fill("online");
    const bar = document.getElementById(id + 'Dots');
    if(bar) {
      bar.innerHTML = '';
      for(let i=0; i<MAX_DOTS; i++) {
        const d = document.createElement('div');
        d.className = 'dot on';
        bar.appendChild(d);
      }
    }
  });
  updateAll();
}

async function updateAll() {
  for (const [id, target] of Object.entries(targets)) {
    const start = Date.now();
    if (target.type === 'mc') {
      try {
        const res = await fetch(`https://api.mcsrvstat.us/2/${target.address}`);
        const data = await res.json();
        const ping = Date.now() - start;
        updateUI(id, data.online, false, ping, data.online ? `${data.players.online} Players` : "OFFLINE");
      } catch { updateUI(id, false, false, 0, "ERROR"); }
    } else {
      try {
        // mode: 'no-cors' はレスポンスの中身は見れませんが、接続成否の判定には使えます
        await fetch(target.address, { mode: 'no-cors', cache: 'no-store' });
        const ping = Date.now() - start;
        updateUI(id, true, false, ping, "ONLINE");
      } catch { updateUI(id, false, false, 0, "OFFLINE"); }
    }
  }
}

function updateUI(id, isOnline, isMaint, ping, statusText) {
  let state = isOnline ? "online" : "offline";
  if (isMaint) state = "maint";

  if (!historyData[id]) historyData[id] = [];
  historyData[id].push(state);
  if(historyData[id].length > MAX_DOTS) historyData[id].shift();

  const badge = document.getElementById(id + 'Badge');
  const pingEl = document.getElementById(id + 'Ping');
  const statusEl = document.getElementById(id + 'Status');
  const bar = document.getElementById(id + 'Dots');

  if(badge) {
    badge.textContent = isOnline ? "100%" : "0%";
    badge.className = isOnline ? "status-badge" : "status-badge offline";
  }
  if(pingEl) pingEl.textContent = (isOnline ? ping : "--") + " ms";
  if(statusEl) statusEl.textContent = statusText;

  if(bar) {
    const dots = bar.children;
    for(let i=0; i < dots.length; i++) {
      dots[i].className = 'dot ' + (historyData[id][i] === "online" ? "on" : (historyData[id][i] === "maint" ? "maint" : "off"));
    }
  }
}

init();
setInterval(updateAll, 30000); 
</script>
</body>
</html>
