<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すとサーバー Status</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.status-box {
  padding: 8px;
  border-radius: 8px;
  font-weight: bold;
}

.online { background: #e8f7ee; color: #1a7f37; }
.offline { background: #ffe6e6; color: #a00000; }

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

/* バーの背景（溝）を少し見やすく */
.bar-bg {
  width: 100%;
  background: #eee; /* 薄いグレー */
  border-radius: 4px;
  margin-top: 5px;
  height: 8px; /* 高さを固定 */
  overflow: hidden; /* はみ出し防止 */
}

.bar {
  height: 100%; /* 親の高さに合わせる */
  width: 0%;
  background: #ccc; /* デフォルト色 */
  transition: width 0.5s ease, background 0.5s ease;
}


/* ミニ */
.mini {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 0 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="mini">
  リリース鯖: <span id="miniNet">...</span> |
  β鯖: <span id="miniX">...</span> |
  Web: <span id="miniWeb">...</span>
</div>

<div class="container">

<div class="card">
  <div class="title">すとサーバー ネットワーク</div>
  <div id="statusText" class="status-box online">⏳ 読み込み中...</div>
</div>

<!-- メイン鯖 -->
<div class="card">
  <div class="title">マイクラ（sutoserver.net）</div>

  <div class="row"><span>状態</span><span id="netStatus">...</span></div>
  <div class="row"><span>プレイヤー</span><span id="netPlayers">-- / --</span></div>
  <div class="row"><span>Ping</span><span id="netPing">-- ms</span></div>

  <div class="bar-bg"><div class="bar" id="netBar"></div></div>
</div>

<!-- β -->
<div class="card">
  <div class="title">マイクラ（sutoserver.xgames.jp）</div>

  <div class="row"><span>状態</span><span id="xStatus">...</span></div>
  <div class="row"><span>プレイヤー</span><span id="xPlayers">-- / --</span></div>
  <div class="row"><span>Ping</span><span id="xPing">-- ms</span></div>

  <div class="bar-bg"><div class="bar" id="xBar"></div></div>
</div>

<!-- Web -->
<div class="card">
  <div class="title">Webサイト（sutoserver.com）</div>

  <div class="row"><span>状態</span><span id="webStatus">...</span></div>
  <div class="row"><span>応答時間</span><span id="webPing">-- ms</span></div>
</div>

</div>

<script>
const servers = {
  net: "sutoserver.net", // ←必要なら :25565 つける
  x: "sutoserver.xgames.jp"
};

const WEB_URL = "https://sutoserver.com";

// キャッシュ（消え防止）
let cache = {};

// マイクラ
async function checkMC(ip, prefix, miniId) {
  try {
    const res = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
    const data = await res.json();

    const bar = document.getElementById(prefix + "Bar");
    const pingEl = document.getElementById(prefix + "Ping");

    if (data.online) {
      const now = data.players?.online;
      const max = data.players?.max;
      const pingValue = data.debug?.ping;

      if (now !== undefined && max !== undefined) {
        cache[prefix] = { now, max };
      }

      const c = cache[prefix] || { now: 0, max: 0 };

      document.getElementById(prefix + "Status").textContent = "オンライン";
      document.getElementById(prefix + "Players").textContent = `${c.now} / ${c.max}`;

      // Ping保持
      if (pingValue !== undefined) {
        pingEl.textContent = pingValue + " ms";
      }

      const percent = c.max > 0 ? (c.now / c.max) * 100 : 0;
      bar.style.width = percent + "%";

      // 色（滑らか変化）
      const hue = 120 - (percent * 1.2);
      bar.style.background = `hsl(${hue}, 70%, 50%)`;

      document.getElementById(miniId).textContent = "🟢";
      return true;

    } else {
      document.getElementById(prefix + "Status").textContent = "取得失敗（保持中）";
      document.getElementById(miniId).textContent = "🟡";
      return false;
    }

  } catch {
    document.getElementById(prefix + "Status").textContent = "エラー（保持中）";
    document.getElementById(miniId).textContent = "🟡";
    return false;
  }
}

// Web
async function checkWeb() {
  const start = Date.now();
  try {
    await fetch(WEB_URL, { mode: "no-cors" });
    const time = Date.now() - start;

    document.getElementById("webStatus").textContent = "オンライン";
    document.getElementById("webPing").textContent = time + " ms";
    document.getElementById("miniWeb").textContent = "🟢";
    return true;

  } catch {
    document.getElementById("webStatus").textContent = "取得失敗（保持中）";
    document.getElementById("miniWeb").textContent = "🟡";
    return false;
  }
}

// 全体
async function updateAll() {
  const net = await checkMC(servers.net, "net", "miniNet");
  const x = await checkMC(servers.x, "x", "miniX");
  const web = await checkWeb();

  const statusBox = document.getElementById("statusText");

  if (net || x || web) {
    statusBox.textContent = "✅ 一部または全部稼働中";
    statusBox.className = "status-box online";
  } else {
    statusBox.textContent = "❌ 全停止";
    statusBox.className = "status-box offline";
  }
}

updateAll();
setInterval(updateAll, 10000);
</script>

</body>
</html>
