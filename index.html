<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すとサーバー Status</title>
<style>
  :root {
    --bg-color: #f8f9fa;
    --card-bg: #ffffff;
    --online-color: #2ecc71;
    --offline-color: #e74c3c;
    --maint-color: #f39c12;
    --text-main: #333;
    --text-sub: #95a5a6;
  }

  body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg-color); margin: 0; padding: 20px; color: var(--text-main); line-height: 1.6; }
  .container { max-width: 600px; margin: auto; }
  
  .group-title { margin-bottom: 5px; font-size: 13px; color: var(--text-sub); font-weight: bold; letter-spacing: 1px; }
  .main-title { font-size: 26px; font-weight: 800; margin-bottom: 25px; }

  .card {
    background: var(--card-bg);
    padding: 24px;
    border-radius: 18px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.05);
  }

  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }

  .server-name-wrap { display: flex; align-items: center; gap: 12px; }
  
  /* 画像スタイルのバッジ */
  .status-badge {
    background: var(--online-color);
    color: white;
    padding: 4px 14px;
    border-radius: 25px;
    font-size: 11px;
    font-weight: 800;
    min-width: 40px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(46, 204, 113, 0.2);
  }
  .status-badge.offline { background: var(--offline-color); box-shadow: 0 2px 5px rgba(231, 76, 60, 0.2); }
  .status-badge.maintenance { background: var(--maint-color); box-shadow: 0 2px 5px rgba(243, 156, 18, 0.2); }

  .server-name { font-size: 18px; font-weight: 700; color: #2c3e50; }
  .ping-display { font-size: 12px; color: var(--text-sub); font-family: monospace; }

  .info-row { display: flex; justify-content: space-between; font-size: 13px; color: #7f8c8d; margin-bottom: 2px; }

  /* ドットバーのデザイン（画像再現） */
  .uptime-bar {
    display: flex;
    gap: 4px;
    height: 32px;
    margin-top: 15px;
  }

  .dot {
    flex: 1;
    height: 100%;
    background: #f0f0f0;
    border-radius: 4px;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .dot.on { background: var(--online-color); }
  .dot.off { background: var(--offline-color); }
  .dot.maint { background: var(--maint-color); }

  .time-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #bdc3c7;
    margin-top: 8px;
    font-weight: bold;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">
  <div class="group-title">SUTO NETWORK INFORMATION</div>
  <div class="main-title">すとサーバー Status</div>

  <div class="card">
    <div class="title-row">
      <div class="server-name-wrap">
        <span id="netBadge" class="status-badge">---</span>
        <span class="server-name">リリース鯖</span>
      </div>
      <span id="netPing" class="ping-display">-- ms</span>
    </div>
    <div class="info-row">
      <span>Players: <span id="netPlayers" style="font-weight:bold; color:#333;">-- / --</span></span>
      <span style="font-size: 11px;">node1.swdhst.com:2087</span>
    </div>
    <div class="uptime-bar" id="netDots"></div>
    <div class="time-label"><span>30m ago</span><span>now</span></div>
  </div>

  <div class="card">
    <div class="title-row">
      <div class="server-name-wrap">
        <span id="xBadge" class="status-badge">---</span>
        <span class="server-name">β鯖</span>
      </div>
      <span id="xPing" class="ping-display">-- ms</span>
    </div>
    <div class="info-row">
      <span>Players: <span id="xPlayers" style="font-weight:bold; color:#333;">-- / --</span></span>
      <span style="font-size: 11px;">sutoserver.xgames.jp</span>
    </div>
    <div class="uptime-bar" id="xDots"></div>
    <div class="time-label"><span>30m ago</span><span>now</span></div>
  </div>
</div>

<script>
const servers = {
  net: "node1.swdhst.com:2087",
  x: "sutoserver.xgames.jp"
};

const MAX_DOTS = 32; 
let historyData = { net: [], x: [] };

function init() {
  ['net', 'x'].forEach(id => {
    const bar = document.getElementById(id + 'Dots');
    bar.innerHTML = '';
    // 初期表示でドットを「オンライン」状態で埋める
    historyData[id] = Array(MAX_DOTS).fill("online"); 

    for(let i=0; i<MAX_DOTS; i++) {
      const d = document.createElement('div');
      d.className = 'dot on'; 
      bar.appendChild(d);
    }
  });
  updateAll();
}

async function checkServer(ip, prefix) {
  const start = Date.now();
  try {
    const res = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
    const data = await res.json();
    const selfPing = Date.now() - start;

    // MOTDに「メンテ」があればメンテナンスモード発動
    const motd = data.motd?.clean?.join(" ") || "";
    const isMaint = motd.includes("メンテナンス") || motd.includes("Maintenance") || motd.includes("メンテ");
    const isOnline = data.online === true;

    // 履歴を1つ進める
    let statusState = "online";
    if (!isOnline) statusState = "offline";
    if (isMaint) statusState = "maint";

    historyData[prefix].push(statusState);
    if(historyData[prefix].length > MAX_DOTS) historyData[prefix].shift();

    // バッジ更新
    const badge = document.getElementById(prefix + 'Badge');
    const playerEl = document.getElementById(prefix + 'Players');
    
    if (isMaint) {
      badge.textContent = "メンテ";
      badge.className = "status-badge maintenance";
      playerEl.textContent = "CLOSE";
    } else {
      badge.textContent = isOnline ? "100%" : "0%";
      badge.className = isOnline ? "status-badge" : "status-badge offline";
      playerEl.textContent = isOnline ? `${data.players.online} / ${data.players.max}` : "OFFLINE";
    }

    // Ping更新
    document.getElementById(prefix + 'Ping').textContent = (isOnline ? selfPing : "--") + " ms";

    // ドット色の再描画
    const dots = document.getElementById(prefix + 'Dots').children;
    for(let i=0; i < MAX_DOTS; i++) {
      dots[i].className = 'dot';
      const state = historyData[prefix][i];
      if (state === "online") dots[i].classList.add('on');
      else if (state === "maint") dots[i].classList.add('maint');
      else dots[i].classList.add('off');
    }
  } catch (e) { console.error(e); }
}

function updateAll() {
  checkServer(servers.net, 'net');
  checkServer(servers.x, 'x');
}

init();
setInterval(updateAll, 20000); // 20秒更新
</script>
</body>
</html>
