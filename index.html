<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すとサーバー Status</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.status-box {
  padding: 8px;
  border-radius: 8px;
  font-weight: bold;
}

.online { background: #e8f7ee; color: #1a7f37; }
.offline { background: #ffe6e6; color: #a00000; }

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

/* バー背景 */
.bar-bg {
  width: 100%;
  background: #ddd;
  border-radius: 4px;
  margin-top: 5px;
}

/* グラデーションバー */
.bar {
  width: 100%;
  height: 8px;
  background: #2ecc71;
  border-radius: 4px;
  margin-top: 5px;
}
/* ミニ */
.mini {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 0 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- ミニ -->
<div class="mini">
  .net: <span id="miniNet">...</span> |
  xgames: <span id="miniX">...</span> |
  Web: <span id="miniWeb">...</span>
</div>

<div class="container">

<!-- 全体 -->
<div class="card">
  <div class="title">すとサーバー ネットワーク</div>
  <div id="statusText" class="status-box online">
    ⏳ 読み込み中...
  </div>
</div>

<!-- MC .net -->
<div class="card">
  <div class="title">マイクラ（sutoserver.net）</div>

  <div class="row"><span>状態</span><span id="netStatus">...</span></div>
  <div class="row"><span>プレイヤー</span><span id="netPlayers">-- / --</span></div>
  <div class="row"><span>Ping</span><span id="netPing">-- ms</span></div>

  <div class="bar-bg">
    <div class="bar" id="netBar"></div>
  </div>
</div>

<!-- MC xgames -->
<div class="card">
  <div class="title">マイクラ（sutoserver.xgames.jp）</div>

  <div class="row"><span>状態</span><span id="xStatus">...</span></div>
  <div class="row"><span>プレイヤー</span><span id="xPlayers">-- / --</span></div>
  <div class="row"><span>Ping</span><span id="xPing">-- ms</span></div>

  <div class="bar-bg">
    <div class="bar" id="xBar"></div>
  </div>
</div>

<!-- Web -->
<div class="card">
  <div class="title">Webサイト（sutoserver.com）</div>

  <div class="row"><span>状態</span><span id="webStatus">...</span></div>
  <div class="row"><span>応答時間</span><span id="webPing">-- ms</span></div>
</div>

</div>

<script>
const servers = {
  net: "sutoserver.net",
  x: "sutoserver.xgames.jp"
};

const WEB_URL = "https://sutoserver.com";

// マイクラ
async function checkMC(ip, prefix, miniId) {
  try {
    const res = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
    const data = await res.json();

    if (data.online) {
      document.getElementById(prefix + "Status").textContent = "オンライン";

      const now = data.players?.online ?? 0;
      const max = data.players?.max ?? 0;

      document.getElementById(prefix + "Players").textContent = `${now} / ${max}`;
      document.getElementById(prefix + "Ping").textContent = data.debug?.ping + " ms";

      // バー割合（安全）
      const percent = max > 0 ? (now / max) * 100 : 0;
      document.getElementById(prefix + "Bar").style.width = percent + "%";

      document.getElementById(miniId).textContent = "🟢";
      return true;
    } else {
      document.getElementById(prefix + "Status").textContent = "オフライン";
      document.getElementById(prefix + "Players").textContent = "-- / --";
      document.getElementById(prefix + "Ping").textContent = "-- ms";
      document.getElementById(prefix + "Bar").style.width = "0%";

      document.getElementById(miniId).textContent = "🔴";
      return false;
    }
  } catch {
    document.getElementById(prefix + "Status").textContent = "エラー";
    return false;
  }
}

// Web
async function checkWeb() {
  const start = Date.now();
  try {
    await fetch(WEB_URL, { mode: "no-cors" });
    const time = Date.now() - start;

    document.getElementById("webStatus").textContent = "オンライン";
    document.getElementById("webPing").textContent = time + " ms";
    document.getElementById("miniWeb").textContent = "🟢";
    return true;
  } catch {
    document.getElementById("webStatus").textContent = "オフライン";
    document.getElementById("webPing").textContent = "-- ms";
    document.getElementById("miniWeb").textContent = "🔴";
    return false;
  }
}

// 全体
async function updateAll() {
  const net = await checkMC(servers.net, "net", "miniNet");
  const x = await checkMC(servers.x, "x", "miniX");
  const web = await checkWeb();

  const statusBox = document.getElementById("statusText");

  if (net || x || web) {
    statusBox.textContent = "✅ 一部または全部稼働中";
    statusBox.className = "status-box online";
  } else {
    statusBox.textContent = "❌ 全停止";
    statusBox.className = "status-box offline";
  }
}

// 実行
updateAll();
setInterval(updateAll, 10000);
</script>

</body>
</html>
