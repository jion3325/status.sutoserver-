<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すとサーバー Status</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.status-box {
  padding: 8px;
  border-radius: 8px;
  font-weight: bold;
}

.online { background: #e8f7ee; color: #1a7f37; }
.offline { background: #ffe6e6; color: #a00000; }

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

/* バーの背景（溝）を少し見やすく */
.bar-bg {
  width: 100%;
  background: #eee; /* 薄いグレー */
  border-radius: 4px;
  margin-top: 5px;
  height: 8px; /* 高さを固定 */
  overflow: hidden; /* はみ出し防止 */
}

.bar {
  height: 100%; /* 親の高さに合わせる */
  width: 0%;
  background: #ccc; /* デフォルト色 */
  transition: width 0.5s ease, background 0.5s ease;
}


/* ミニ */
.mini {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 0 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="mini">
  リリース鯖: <span id="miniNet">...</span> |
  β鯖: <span id="miniX">...</span> |
  Web: <span id="miniWeb">...</span>
</div>

<div class="container">

<div class="card">
  <div class="title">すとサーバー ネットワーク</div>
  <div id="statusText" class="status-box online">⏳ 読み込み中...</div>
</div>

<!-- メイン鯖 -->
<div class="card">
  <div class="title">マイクラ（sutoserver.net）</div>

  <div class="row"><span>状態</span><span id="netStatus">...</span></div>
  <div class="row"><span>プレイヤー</span><span id="netPlayers">-- / --</span></div>
  <div class="row"><span>Ping</span><span id="netPing">-- ms</span></div>

  <div class="bar-bg"><div class="bar" id="netBar"></div></div>
</div>

<!-- β -->
<div class="card">
  <div class="title">マイクラ（sutoserver.xgames.jp）</div>

  <div class="row"><span>状態</span><span id="xStatus">...</span></div>
  <div class="row"><span>プレイヤー</span><span id="xPlayers">-- / --</span></div>
  <div class="row"><span>Ping</span><span id="xPing">-- ms</span></div>

  <div class="bar-bg"><div class="bar" id="xBar"></div></div>
</div>

<!-- Web -->
<div class="card">
  <div class="title">Webサイト（sutoserver.com）</div>

  <div class="row"><span>状態</span><span id="webStatus">...</span></div>
  <div class="row"><span>応答時間</span><span id="webPing">-- ms</span></div>
</div>

</div>

<script>
const servers = {
  net: "sutoserver.net", // ←必要なら :25565 つける
  x: "sutoserver.xgames.jp"
};

const WEB_URL = "https://sutoserver.com";

// キャッシュ（消え防止）
let cache = {};

// マイクラサーバーのチェック関数（修正版）
async function checkMC(ip, prefix, miniId) {
  const bar = document.getElementById(prefix + "Bar");
  const pingEl = document.getElementById(prefix + "Ping");
  const statusEl = document.getElementById(prefix + "Status");
  const playersEl = document.getElementById(prefix + "Players");
  const miniEl = document.getElementById(miniId);

  try {
    const res = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
    const data = await res.json();

    if (data.online) {
      // プレイヤー数（データがない場合は0、最大は1以上にする）
      const now = data.players?.online ?? 0;
      const max = data.players?.max || 1; 
      // Ping値（デバッグ情報から取得、なければ --）
      const pingValue = data.debug?.ping ?? "--";

      // テキスト情報の更新
      statusEl.textContent = "オンライン";
      playersEl.textContent = `${now} / ${max}`;
      pingEl.textContent = pingValue + (pingValue !== "--" ? " ms" : "");

      // 【重要】バーの計算と表示
      const percent = (now / max) * 100;
      bar.style.width = percent + "%";

      // 色の変化（120:緑 → 0:赤）
      const hue = Math.max(0, 120 - (percent * 1.2));
      bar.style.background = `hsl(${hue}, 70%, 50%)`;

      miniEl.textContent = "🟢";
      return true;

    } else {
      // オフラインまたは取得失敗時
      statusEl.textContent = "オフライン";
      miniEl.textContent = "🔴";
      bar.style.width = "0%"; // バーをリセット
      return false;
    }

  } catch (e) {
    statusEl.textContent = "接続エラー";
    miniEl.textContent = "🟡";
    return false;
  }
}


// 全体
async function updateAll() {
  const net = await checkMC(servers.net, "net", "miniNet");
  const x = await checkMC(servers.x, "x", "miniX");
  const web = await checkWeb();

  const statusBox = document.getElementById("statusText");

  if (net || x || web) {
    statusBox.textContent = "✅ 一部または全部稼働中";
    statusBox.className = "status-box online";
  } else {
    statusBox.textContent = "❌ 全停止";
    statusBox.className = "status-box offline";
  }
}

updateAll();
setInterval(updateAll, 10000);
</script>

</body>
</html>
