<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>すとサーバー Status</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.status-box {
  padding: 8px;
  border-radius: 8px;
  font-weight: bold;
}

.online { background: #e8f7ee; color: #1a7f37; }
.offline { background: #ffe6e6; color: #a00000; }

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 5px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}
/* バーの背景（溝） */
.bar-bg {
  width: 100%;
  background: #e0e0e0; /* 薄いグレーで見えるようにする */
  border-radius: 4px;
  margin-top: 8px;
  height: 10px;        /* 高さを少し太くして確実に表示 */
  overflow: hidden;    /* 中身のバーがはみ出さないように */
  display: block;      /* 確実にブロック要素として扱う */
}

/* 動くバー本体 */
.bar {
  height: 100%;        /* 親の高さ(10px)をいっぱい使う */
  width: 0%;           /* 初期値 */
  background: #4caf50; /* デフォルトの色（緑） */
  transition: width 0.8s ease, background 0.8s ease; /* アニメーションを滑らかに */
  display: block;
}



/* ミニ */
.mini {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 0 5px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="mini">
  リリース鯖: <span id="miniNet">...</span> |
  β鯖: <span id="miniX">...</span> |
  Web: <span id="miniWeb">...</span>
</div>

<div class="container">

  <div class="card">
    <div class="title">すとサーバー ネットワーク</div>
    <div id="statusText" class="status-box online">⏳ 読み込み中...</div>
  </div>

  <div class="card">
    <div class="title">マイクラ（sutoserver.net）</div>
    <div class="row"><span>状態</span><span id="netStatus">...</span></div>
    <div class="row"><span>プレイヤー</span><span id="netPlayers">-- / --</span></div>
    <div class="row"><span>Ping</span><span id="netPing">-- ms</span></div>
    <div class="bar-bg"><div class="bar" id="netBar"></div></div>
  </div>

  <div class="card">
    <div class="title">マイクラ（sutoserver.xgames.jp）</div>
    <div class="row"><span>状態</span><span id="xStatus">...</span></div>
    <div class="row"><span>プレイヤー</span><span id="xPlayers">-- / --</span></div>
    <div class="row"><span>Ping</span><span id="xPing">-- ms</span></div>
    <div class="bar-bg"><div class="bar" id="xBar"></div></div>
  </div>

  <div class="card">
    <div class="title">Webサイト（sutoserver.com）</div>
    <div class="row"><span>状態</span><span id="webStatus">...</span></div>
    <div class="row"><span>応答時間</span><span id="webPing">-- ms</span></div>
  </div>

</div>

<script>
const servers = {
  net: "sutoserver.net",
  x: "sutoserver.xgames.jp"
};
const WEB_URL = "https://sutoserver.com";

async function checkMC(ip, prefix, miniId) {
  const bar = document.getElementById(prefix + "Bar");
  const pingEl = document.getElementById(prefix + "Ping");
  const statusEl = document.getElementById(prefix + "Status");
  const playersEl = document.getElementById(prefix + "Players");
  const miniEl = document.getElementById(miniId);

  try {
    const res = await fetch(`https://api.mcsrvstat.us/2/${ip}`);
    if (!res.ok) throw new Error("Network response was not ok");
    const data = await res.json();

    
    if (data.online) {
      // ★ここから中身を書き換えます★
      const now = data.players?.online ?? 0;
      const max = data.players?.max || 1;
      const pingValue = data.debug?.ping ?? "--";

      statusEl.textContent = "オンライン";
      playersEl.textContent = `${now} / ${max}`;
      pingEl.textContent = pingValue + (pingValue !== "--" ? " ms" : "");

      const percent = (now / max) * 100;
      bar.style.width = percent + "%";
      
      // もしバーが消えるなら、ここを backgroundColor に明示的に指定
      const hue = Math.max(0, 120 - (percent * 1.2));
      bar.style.backgroundColor = `hsl(${hue}, 70%, 50%)`; 

      miniEl.textContent = "🟢";
    
      return true;
    } else {
      statusEl.textContent = "オフライン";
      playersEl.textContent = "-- / --";
      pingEl.textContent = "-- ms";
      bar.style.width = "0%";
      miniEl.textContent = "🔴";
      return false;
    }
  } catch (e) {
    statusEl.textContent = "取得エラー";
    miniEl.textContent = "🟡";
    return false;
  }
}

async function checkWeb() {
  const start = Date.now();
  try {
    // Webチェック（CORS回避のためno-corsモード）
    await fetch(WEB_URL, { mode: "no-cors" });
    const time = Date.now() - start;
    document.getElementById("webStatus").textContent = "オンライン";
    document.getElementById("webPing").textContent = time + " ms";
    document.getElementById("miniWeb").textContent = "🟢";
    return true;
  } catch {
    document.getElementById("webStatus").textContent = "接続エラー";
    document.getElementById("miniWeb").textContent = "🔴";
    return false;
  }
}

async function updateAll() {
  const net = await checkMC(servers.net, "net", "miniNet");
  const x = await checkMC(servers.x, "x", "miniX");
  const web = await checkWeb();

  const statusBox = document.getElementById("statusText");
  if (net || x || web) {
    statusBox.textContent = "✅ 一部または全部稼働中";
    statusBox.className = "status-box online";
  } else {
    statusBox.textContent = "❌ 全停止";
    statusBox.className = "status-box offline";
  }
}

// 初回実行
updateAll();
// 20秒おきに更新（負荷軽減のため少し間隔を空けました）
setInterval(updateAll, 20000);
</script>

</body>

</html>
